name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # NOTE: PHP 8.4 only.
  # composer.lock pins transitive deps (doctrine/instantiator, symfony/*, etc.)
  # at versions that require PHP >= 8.4, even though composer.json claims
  # ^8.2|^8.3|^8.4. composer.json's PHP range and laravel/framework range
  # (^9|^10|^11|^12|^13) should be reconciled with what actually resolves
  # before broadening this workflow.
  tests:
    runs-on: ubuntu-latest
    name: PHP 8.4
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.4-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-php8.4-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test
